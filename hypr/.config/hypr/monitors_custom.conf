# Monitor Configuration - Description-Based (Serial Numbers)
# See: https://wiki.hyprland.org/Configuring/Monitors/
# Get monitor descriptions: hyprctl monitors -j | jq '.[].description'

# Environment
env = GDK_SCALE, 1.75

# =============================================================================
# HOME OFFICE - Kamino (2x LG 27GN950)
# =============================================================================
monitor = desc:LG Electronics 27GN950 203NTZNC4909, 3840x2160@144, 0x0, 2
monitor = desc:LG Electronics 27GN950 102NTGYB2991, 3840x2160@144, 1920x0, 2

# =============================================================================
# WORK OFFICE - TODO: Fill in serial numbers when at work
# Run: hyprctl monitors -j | jq '.[].description'
# =============================================================================
# monitor = desc:LG Electronics MODEL SERIAL1, 3840x2160@144, 0x0, 2
# monitor = desc:LG Electronics MODEL SERIAL2, 3840x2160@144, 1920x0, 2

# =============================================================================
# FRAMEWORK LAPTOP - Standalone (no external monitors)
# =============================================================================
monitor = eDP-1, 2880x1920@120, auto, 2

# =============================================================================
# FALLBACK - Unknown monitors
# =============================================================================
monitor = , preferred, auto, 2

