# Workspace Configuration - Bound by Monitor Description
# Workspaces 1-3 on primary (left), 4-6 on secondary (right)

# =============================================================================
# HOME OFFICE - Kamino (2x LG 27GN950)
# =============================================================================
workspace = 1, monitor:desc:LG Electronics 27GN950 203NTZNC4909
workspace = 2, monitor:desc:LG Electronics 27GN950 203NTZNC4909
workspace = 3, monitor:desc:LG Electronics 27GN950 203NTZNC4909

workspace = 4, monitor:desc:LG Electronics 27GN950 102NTGYB2991
workspace = 5, monitor:desc:LG Electronics 27GN950 102NTGYB2991
workspace = 6, monitor:desc:LG Electronics 27GN950 102NTGYB2991

# =============================================================================
# WORK OFFICE - TODO: Fill in serial numbers when at work
# Run: hyprctl monitors -j | jq '.[].description'
# =============================================================================
# workspace = 1, monitor:desc:LG Electronics MODEL SERIAL1
# workspace = 2, monitor:desc:LG Electronics MODEL SERIAL1
# workspace = 3, monitor:desc:LG Electronics MODEL SERIAL1
#
# workspace = 4, monitor:desc:LG Electronics MODEL SERIAL2
# workspace = 5, monitor:desc:LG Electronics MODEL SERIAL2
# workspace = 6, monitor:desc:LG Electronics MODEL SERIAL2

# =============================================================================
# FRAMEWORK LAPTOP - Standalone (all workspaces on eDP-1)
# Note: These only apply when no external monitors are connected
# =============================================================================
workspace = 1, monitor:eDP-1, default:true
workspace = 2, monitor:eDP-1
workspace = 3, monitor:eDP-1
workspace = 4, monitor:eDP-1
workspace = 5, monitor:eDP-1
workspace = 6, monitor:eDP-1

# =============================================================================
# KEYBINDINGS - Quick workspace pair switching
# =============================================================================
bind = SUPER, 7, exec, hyprctl dispatch workspace 4; hyprctl dispatch workspace 1
bind = SUPER, 8, exec, hyprctl dispatch workspace 5; hyprctl dispatch workspace 2
bind = SUPER, 9, exec, hyprctl dispatch workspace 6; hyprctl dispatch workspace 3
